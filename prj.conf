# prj.conf — Application-Level Kconfig Settings
#
# =============================================================================
# WHAT THIS FILE DOES
# =============================================================================
#
# This file contains Kconfig settings specific to YOUR APPLICATION.
# It's applied AFTER the board's _defconfig, so it can override board
# defaults or add application-specific features.
#
# Your board _defconfig already enables CONFIG_BT and CONFIG_GPIO,
# so you don't need to repeat them here — but it doesn't hurt to be
# explicit for clarity.
#
# Kconfig precedence (later overrides earlier):
#   1. SoC Kconfig defaults
#   2. Board _defconfig
#   3. Application prj.conf ← this file
#   4. Command-line -DCONFIG_xxx=y overrides
# =============================================================================

# ---- Bluetooth Settings for BATL VCU KeyFob ----
# These are already enabled by board _defconfig, but listed for clarity:
CONFIG_BT=y
CONFIG_BT_SILABS_EFR32=y

# Enable BLE peripheral role (your BATL VCU KeyFob device advertises
# and accepts connections from the car/phone)
CONFIG_BT_PERIPHERAL=y

# Set a device name that will appear in BLE advertisements
CONFIG_BT_DEVICE_NAME="BATL VCU KeyFob"

# ---- Logging (optional, useful during development) ----
# Uncomment when UART is configured:
# CONFIG_LOG=y
# CONFIG_LOG_DEFAULT_LEVEL=3

# Enable the GPIO driver.
CONFIG_GPIO=y
