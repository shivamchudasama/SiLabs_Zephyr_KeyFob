#*******************************************************************************
#
# GPIO
#
#*******************************************************************************
# Enable GPIO support in Zephyr
CONFIG_GPIO=y

#*******************************************************************************
#
# State Machine Framework
#
#*******************************************************************************
# Enable the State Machine Framework in Zephyr
CONFIG_SMF=y

#*******************************************************************************
#
# Heap memory pool size (for dynamic allocations)
#
#*******************************************************************************
# Set heap size to 16 KB
CONFIG_HEAP_MEM_POOL_SIZE=16384

#*******************************************************************************
#
# Stack sizes
#
#*******************************************************************************
# Main thread calls bt_enable(NULL) synchronously, which descends into the
# SiLabs RAIL libraries. The default 1024 B is not sufficient.
CONFIG_MAIN_STACK_SIZE=4096
# SiLabs BLE link layer thread. Default 1024 B overflows when SMP + PHY
# update + DLE are all active.
CONFIG_BT_SILABS_EFR32_LINK_LAYER_STACK_SIZE=4096
# System workqueue runs the connection parameter negotiation work item
# (sv_ConnParamNegotiation). Increase from the default 1024 B.
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

#*******************************************************************************
#
# BLE
#
#*******************************************************************************
# Enable Bluetooth support in Zephyr
CONFIG_BT=y
# Enable peripheral role
CONFIG_BT_PERIPHERAL=y
# Enable GATT client role
CONFIG_BT_GATT_CLIENT=y
# Set the device name and appearance (We can also override these in the application code)
# Device name that will appear during advertising and when connected
CONFIG_BT_DEVICE_NAME="BATL KeyFob"
# Device appearance
CONFIG_BT_DEVICE_APPEARANCE=2243
# Maximum number of simultaneous connections allowed
# Allow only 2 connections at a time
CONFIG_BT_MAX_CONN=1
# BLE security settings (Security Manager Protocol)
# Enable SMP for pairing and bonding
CONFIG_BT_SMP=y
# PHY update support
# Don't auto-update PHY
CONFIG_BT_AUTO_PHY_UPDATE=n
# Enable PHY update support in the stack
CONFIG_BT_PHY_UPDATE=y
# Allow the application to trigger PHY updates
CONFIG_BT_USER_PHY_UPDATE=y
# Data length update support
# Don't auto-update data length
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n
# Enable data length update support in the stack
CONFIG_BT_DATA_LEN_UPDATE=y
# Allow the application to trigger data length updates
CONFIG_BT_USER_DATA_LEN_UPDATE=y
# MTU update support
# Don't auto-update MTU
CONFIG_BT_GATT_AUTO_UPDATE_MTU=n
# Connection parameter update support
# Don't auto-update connection parameters
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=n
# Controller data length (PDU payload) max = 251 bytes
# Set the maximum data length for BLE packets to 251 bytes (max for Bluetooth 5)
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
# ACL buffer sizes must match data length
# Set the ACL RX buffer size to 251 bytes to match the maximum data length
CONFIG_BT_BUF_ACL_RX_SIZE=251
# Set the ACL TX buffer size to 251 bytes to match the maximum data length
CONFIG_BT_BUF_ACL_TX_SIZE=251
# L2CAP TX MTU = payload (244) + 3-byte ATT header
# Set the L2CAP TX MTU to 247 bytes (244 bytes of payload + 3 bytes for ATT header)
CONFIG_BT_L2CAP_TX_MTU=247
# BLE buffer counts (RX-priority profile)
# Keep TX queue modest for ACK/notification traffic
# CONFIG_BT_CTLR_SDC_TX_PACKET_COUNT=6
CONFIG_BT_BUF_ACL_TX_COUNT=6
# Must stay greater than ACL TX count
CONFIG_BT_BUF_EVT_RX_COUNT=10
# Increase controller + host RX depth for sustained inbound throughput
# CONFIG_BT_CTLR_SDC_RX_PACKET_COUNT=20
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=24
# Keep upper TX layers aligned with reduced TX depth
CONFIG_BT_L2CAP_TX_BUF_COUNT=6
CONFIG_BT_ATT_TX_COUNT=6
CONFIG_BT_BUF_CMD_TX_SIZE=255

#*******************************************************************************
#
# Logging
#
#*******************************************************************************
# Enable logging in Zephyr
CONFIG_LOG=y
# Compile-time maximum: log messages above this level are compiled out entirely.
# 4 = DEBUG — keeps all severity levels in the binary.
CONFIG_LOG_MAX_LEVEL=4
# Runtime override: forces every module to emit at DEBUG level regardless of the level
# passed to LOG_MODULE_REGISTER (e.g. APP_LOG is registered at LOG_LEVEL_INF in AppLog.c;
# without this override it would suppress DEBUG messages even though they are compiled in).
CONFIG_LOG_OVERRIDE_LEVEL=4
# Per-subsystem override for the Bluetooth stack (redundant when OVERRIDE_LEVEL=4 above,
# kept explicit so intent is clear when OVERRIDE_LEVEL is changed).
CONFIG_BT_LOG_LEVEL_DBG=y
CONFIG_BT_HCI_DRIVER_LOG_LEVEL_DBG=y
# Immediate mode: LOG_* calls write directly to the RTT backend from the calling thread.
# No deferred buffer or processing thread — simplest path, best for initial bring-up.
# Switch back to deferred mode once RTT output is confirmed working.
CONFIG_LOG_MODE_IMMEDIATE=y
# Deferred mode settings (disabled while using immediate mode)
# CONFIG_LOG_MODE_DEFERRED=y
# CONFIG_LOG_PROCESS_THREAD=y
# CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=1
# CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=1
# CONFIG_LOG_BUFFER_SIZE=10240
# Enable SEGGER RTT backend for logging (no UART configured; view output via J-Link RTT Viewer)
CONFIG_USE_SEGGER_RTT=y
# Log backend channel index. Default is 0 (Terminal 0 in RTT Viewer). Setting this to a
# non-zero value routes logs to a different RTT channel — only change if you intentionally
# split channels (e.g. console on 0, logs on 1) and have configured RTT Viewer accordingly.
# CONFIG_LOG_BACKEND_RTT_BUFFER=1
# RTT console: routes printk() to RTT channel 0. Not needed when only LOG_* macros are used.
# Enable if you want printk()/assert output visible in RTT Viewer alongside LOG_* output.
# CONFIG_CONSOLE=y
# CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y
# BT HCI monitor over RTT: outputs raw binary HCI data to a dedicated RTT channel.
# Useful with Wireshark/btmon for protocol analysis — NOT human-readable in RTT Viewer.
# Use CONFIG_BT_LOG_LEVEL_DBG=y (above) for readable BT text logs instead.
# CONFIG_BT_DEBUG_MONITOR_RTT=y
# CONFIG_BT_DEBUG_MONITOR_RTT_BUFFER=2
CONFIG_LOG_BACKEND_RTT_MODE_DROP=y
# # Block mode: the logging backend stalls until the RTT host reads the buffer, guaranteeing
# # lossless capture. Connect J-Link RTT Viewer BEFORE powering / resetting the device.
# # Switch back to CONFIG_LOG_BACKEND_RTT_MODE_DROP=y for production builds where a debugger
# # is not always attached.
# CONFIG_LOG_BACKEND_RTT_MODE_BLOCK=y
# RTT up-channel (device → host) buffer. Default is 512 B which overflows instantly when
# BT debug logging is active. 4096 B gives the host enough headroom to drain the buffer.
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=10240
# Explicitly disable UART log backend — no UART is wired on this board and Zephyr may
# auto-enable it via Kconfig dependencies, causing silent init failures.
CONFIG_LOG_BACKEND_UART=n

#*******************************************************************************
#
# Debug
#
#*******************************************************************************
# Use debug-friendly optimizations (-Og) instead of size optimizations (-Os)
# so that GDB can step through code and inspect variables properly
CONFIG_DEBUG_OPTIMIZATIONS=y

